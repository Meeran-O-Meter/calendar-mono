<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Mono</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="parent-container">
        <div class="container" style="margin-left: 3vw;">
            <h2 class="title">CALENDAR MONO_</h2>
            <div class="calendar-div">

                <div class="time-and-month">
                    <p id="month-display"></p>
                    <p id="time-display"></p>
                </div>

                <div id="calendar-days">
                    <div style="color: #AF141C;">SUN</div>
                    <div>MON</div>
                    <div>TUE</div>
                    <div>WED</div>
                    <div>THU</div>
                    <div>FRI</div>
                    <div>SAT</div>
                </div>

                <div id="calendar-dates"></div>
            </div>

        </div>

        <div class="right-side">
            <div class="clock-container">
                <div class="clock">
                    <div class="middle"></div>
                    <div class="middle-1"></div>
                    <div class="hour"></div>
                    <div class="minute"></div>
                    <div class="second"></div>
                </div>

                <div class="other-clock-items">
                    <div class="day-clock"></div>
                    <div class="date-clock"></div>

                    <div class="digital-time">
                        <div class="digital-time-clock"></div>
                        <div class="am-pm"></div>
                    </div>
                </div>
            </div>

            <div class="quote-container">
                <p class="quote-title">I'VE GOT TIME</p>
                <p class="quote">To procrastinate is to voluntarily delay and lower the probability of your success.</p>
            </div>
        </div>




    </div>


    <script src="./script.js"></script>
</body>
</html>
